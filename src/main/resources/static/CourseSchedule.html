<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Schedule</title>
    <script src="https://cdn.feczine.cn/library/vue/vue2/vue.js"></script>
    <script src="https://cdn.feczine.cn/library/axios/axios.min.js"></script>
    <script src="https://cdn.feczine.cn/library/element-ui/index.js"></script>
    <link rel="stylesheet" href="https://cdn.feczine.cn/library/element-ui/index.css">
</head>
<body>
<div id="app">
    <el-container>
        <el-header>
            <template>
                <label>日期：</label>
                <el-select @change="listCourseByDate()" v-model="date" placeholder="请选择日期" style="width:15%">
                  <el-option
                    v-for="date in dates"
                    :key="date.value"
                    :label="date.label"
                    :value="date.value">
                  </el-option>
                </el-select>
            </template>
            <template>
                <el-button type="primary" plain @click="submitDialogVisible = true">添加课程</el-button>
                <el-dialog title="添加课程" :visible.sync="submitDialogVisible" width="60%">
                    <el-form ref="form" :model="form" :rules="rules" label-width="100px">
                        <el-form-item label="课程名称" prop="courseName">
                        <el-input v-model="form.courseName"></el-input>
                        </el-form-item>
                        <el-form-item label="上课地点" prop="courseLocation">
                        <el-input v-model="form.courseLocation"></el-input>
                        </el-form-item>
                        <el-form-item label="授课老师" prop="courseLecturer">
                        <el-input v-model="form.courseLecturer"></el-input>
                        </el-form-item>
                        <el-form-item label="日期" prop="courseEndTime">
                            <el-select v-model="form.courseShowDate" placeholder="请选择日期">
                                <el-option label="周一" value="Monday"></el-option>
                                <el-option label="周二" value="Tuesday"></el-option>
                                <el-option label="周三" value="Wednesday"></el-option>
                                <el-option label="周四" value="Thursday"></el-option>
                                <el-option label="周五" value="Friday"></el-option>
                                <el-option label="周六" value="Saturday"></el-option>
                                <el-option label="周日" value="Sunday"></el-option>
                            </el-select>
                        </el-form-item>
                        <el-form-item label="时间" prop="courseEndTime">
                            <el-time-select
                                placeholder="开始时间"
                                v-model="form.courseStartTime"
                                :picker-options="{
                                    start: '08:10',
                                    step: '00:05',
                                    end: '19:55',
                                }">
                            </el-time-select>
                            <label> - </label>
                            <el-time-select
                                placeholder="结束时间"
                                v-model="form.courseEndTime"
                                :picker-options="{
                                    start: '08:10',
                                    step: '00:05',
                                    end: '19:55',
                                    minTime: form.courseStartTime
                                }">
                            </el-time-select>
                        </el-form-item>
                    </el-form>

                    <span slot="footer" class="dialog-footer">
                        <el-button @click="submitDialogVisible = false; clearSubmitData();">取 消</el-button>
                        <el-button type="primary" @click="submitCourse();">提 交</el-button>
                    </span>
                </el-dialog>
            </template>
            <template>
                <el-button @click="deleteDialogVisible = true" type="danger" plain>删除课程</el-button>
                <el-dialog title="添加课程" :visible.sync="deleteDialogVisible" width="60%">
                    <el-form :model="delForm" ref="delForm" label-width="100px">
                        <el-form-item label="课程名称">
                            <el-input v-model="delForm.delCorseName"></el-input>
                        </el-form-item>
                    </el-form>
                    <span slot="footer" class="dialog-footer">
                        <el-button @click="deleteDialogVisible = false; clearDelFormData();">取 消</el-button>
                        <el-button type="primary" @click="ensureDel();">删 除</el-button>
                    </span>
                </el-dialog>
            </template>
        </el-header>
        <el-main>
            <el-table
                :data="tableData"
                :header-cell-style="rowStyle"
                :cell-style="rowStyle"
                :default-sort = "{prop: 'courseShowDate', order: 'descending'}"
                border
                style="width: 100%">
                <el-table-column prop="courseShowDate" label="日期" sortable></el-table-column>
                <el-table-column prop="courseShowTime" label="时间"></el-table-column>
                <el-table-column prop="courseName" label="课程名"></el-table-column>
                <el-table-column prop="courseLocation" label="上课地点"></el-table-column>
                <el-table-column prop="courseLecturer" label="授课老师"></el-table-column>
            </el-table>
        </el-main>
    </el-container>
</div>
<script>
    const app = new Vue({
        el: "#app",
        data() {
            return {
                form: {
                    courseName: null,
                    courseLocation: null,
                    courseLecturer: null,
                    courseShowDate: null,
                    courseShowTime: null,
                    courseStartTime: null,
                    courseEndTime: null
                },
                delForm: {
                    delCorseName: null
                },
                submitDialogVisible: false,
                deleteDialogVisible: false,
                tableData: [],
                date: null,
                dates: [
                    {
                        value: 'All',
                        label: '全部'
                    }, {
                        value: 'Monday',
                        label: '周一'
                    }, {
                        value: 'Tuesday',
                        label: '周二'
                    }, {
                        value: 'Wednesday',
                        label: '周三'
                    }, {
                        value: 'Thursday',
                        label: '周四'
                    }, {
                        value: 'Friday',
                        label: '周五'
                    }, {
                        value: 'Saturday',
                        label: '周六'
                    }, {
                        value: 'Sunday',
                        label: '周日'
                    }
                ],
                rules: {
                    courseName: [
                        { required: true, message: '请输入课程名称', trigger: 'blur' }
                    ],
                    courseLocation: [
                        { required: true, message: '请选择上课地点', trigger: 'blur' }
                    ],
                    courseLecturer: [
                        { required: true, message: '请输入授课老师', trigger: 'blur' }
                    ],
                    courseShowDate: [
                        { type: 'date', required: true, message: '请选择日期', trigger: 'blur' }
                    ],
                    courseStartTime: [
                        { type: 'date', required: true, message: '请选择开始时间', trigger: 'blur' }
                    ],
                    courseEndTime: [
                        { type: 'date', required: true, message: '请选择结束时间', trigger: 'change' }
                    ]
                }
            }
        },
        methods: {
            rowStyle() {
                return "text-align:center";
            },
            msgReminder(msg, type) {
                this.$message({
                    message: msg,
                    type: type
                });
            },
            getSchedule() {
                let _this = this;
                axios.get("/schedules")
                .then(function (response) {
                    if (response.data.code === 20061) {
                        _this.tableData = response.data.data;
                    } else {
                        _this.msgReminder("获取数据失败，请刷新重试！", "warning");
                    }
                });
            },
            listCourseByDate() {
                let _this = this;
                if (_this.date !== "All") {
                    axios.get("/schedules/courseDate/" + _this.date)
                    .then(function (response) {
                        if (response.data.code === 20051) {
                            _this.tableData = response.data.data;
                        } else {
                            _this.msgReminder("获取数据失败，请刷新重试！", "warning");
                        }
                    });
                } else {
                    _this.getSchedule();
                }
            },
            clearSubmitData() {
                this.courseName = null;
                this.courseLocation = null;
                this.courseLecturer = null;
                this.courseShowDate = null;
                this.courseShowTime = null;
                this.courseStartTime = null;
                this.courseEndTime = null;
            },
            submitCourse() {
                let _this = this;
                _this.submitDialogVisible = false;
                axios.post('/schedules', {
                    courseName: _this.form.courseName,
                    courseLocation: _this.form.courseLocation,
                    courseLecturer: _this.form.courseLecturer,
                    courseShowDate : _this.form.courseShowDate,
                    courseShowTime : _this.form.courseStartTime + "-" + _this.form.courseEndTime
                })
                .then(function (response) {
                    if (response.data.code === 20011) {
                        _this.clearSubmitData();
                        _this.getSchedule();
                        _this.msgReminder("添加成功", "success");
                    } else if (response.data.code === 20010) {
                        _this.clearSubmitData();
                        _this.msgReminder("添加失败", "warning");
                    } else {
                        _this.clearSubmitData();
                        _this.msgReminder("系统错误", "warning");
                    }
                });
            },
            clearDelFormData() {
                this.delForm.delCorseName = null;
            },
            delCourse() {
                let _this = this;
                _this.deleteDialogVisible = false;
                axios.delete('/schedules/' + _this.delForm.delCorseName)
                .then(function (response) {
                    if (response.data.code === 20021) {
                        _this.clearDelFormData();
                        _this.getSchedule();
                        _this.msgReminder("删除成功", "success");
                    } else if (response.data.code === 20020) {
                        _this.clearDelFormData();
                        _this.msgReminder("删除失败", "warning");
                    } else {
                        _this.clearDelFormData();
                        _this.msgReminder("系统错误", "warning");
                    }
                });
            },
            ensureDel() {
                this.$confirm('此操作将永久删除课程, 是否继续？', '提示', {
                confirmButtonText: '删除',
                cancelButtonText: '取消',
                type: 'warning'
                }).then(() => {
                    this.delCourse();
                }).catch(() => {
                    this.clearDelFormData();
                    this.$message({
                        type: 'info',
                        message: '已取消删除'
                    });
                });
            },
        },
    });
    app.getSchedule();
</script>
<style>
  .el-header, .el-footer {
    background-color: #B3C0D1;
    color: #333;
    line-height: 60px;
  }
  .el-aside {
    background-color: #D3DCE6;
    color: #333;
    text-align: center;
    line-height: 200px;
  }
  
  .el-main {
    background-color: #E9EEF3;
    color: #333;
    text-align: center;
    line-height: 20px;
  }
</style>
</body>
</html>
